name: Universal Cross-Platform Matrix Release Engine

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: "https://download.live555.com"

# CI/CD Protocol Standard: Enforce global read-only boundaries
permissions:
  contents: read

jobs:
  sync-upstream:
    name: Sync Upstream & Tag Lifecycle
    runs-on: ubuntu-latest
    permissions:
      contents: write # Granted exclusively for pushing the source baseline and release tags
    outputs:
      changed: ${{ steps.changelog.outputs.CHANGED }}
      version: ${{ steps.changelog.outputs.VERSION_DATE }}
    steps:
      - name: Checkout Tracking Matrix
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Inspect Upstream Release Status
        id: changelog
        run: |
          # Isolate network calls inside volatile /tmp space to protect repository tracking integrity
          curl -fsSL "${{ env.BASE_URL }}/changelog.txt" -o /tmp/current_changelog.txt
          REMOTE_HASH=$(md5sum /tmp/current_changelog.txt | awk '{print $1}')
          
          # Always extract version date for downstream use in manual triggers
          VERSION_DATE=$(grep -m 1 -Eo '[0-9]{4}-[0-9]{2}-[0-9]{2}' /tmp/current_changelog.txt | tr '-' '.')
          echo "VERSION_DATE=$VERSION_DATE" >> $GITHUB_OUTPUT

          if [ -f .github/tracking/changelog.md5 ]; then
            LOCAL_HASH=$(cat .github/tracking/changelog.md5)
          else
            LOCAL_HASH=""
          fi

          if [ "$REMOTE_HASH" != "$LOCAL_HASH" ]; then
            echo "CHANGED=true" >> $GITHUB_OUTPUT
          else
            echo "CHANGED=false" >> $GITHUB_OUTPUT
          fi

      - name: Mirror Clean Source Tree to Main
        if: steps.changelog.outputs.CHANGED == 'true'
        run: |
          mkdir -p /tmp/live555-source
          curl -fsSL "${{ env.BASE_URL }}/live555-latest.tar.gz" -o /tmp/live555-latest.tar.gz
          tar -xf /tmp/live555-latest.tar.gz --strip-components=1 -C /tmp/live555-source
          
          # Upstream source tracking synchronization loop
          rsync -av --delete --exclude '.git' --exclude '.github' --exclude '.gemini/' /tmp/live555-source/ ./
          
          mkdir -p .github/tracking
          md5sum /tmp/current_changelog.txt | awk '{print $1}' > .github/tracking/changelog.md5
          cp /tmp/current_changelog.txt ./changelog.txt
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -A
          if ! git diff-index --quiet HEAD; then
            git commit -m "upstream: mirror clean live555 source v${{ steps.changelog.outputs.VERSION_DATE }}"
            if ! git rev-parse "v${{ steps.changelog.outputs.VERSION_DATE }}" >/dev/null 2>&1; then
              git tag "v${{ steps.changelog.outputs.VERSION_DATE }}"
              git push origin main
              git push origin "v${{ steps.changelog.outputs.VERSION_DATE }}"
            else
              git push origin main
            fi
          fi

  build-matrix:
    needs: sync-upstream
    if: needs.sync-upstream.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    name: Compile (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Core Linux Matrix Targets
          - target: linux
            os: ubuntu-latest
            suffix: linux
            output_name: linux
          - target: linux-64bit
            os: ubuntu-latest
            suffix: linux-64bit
            output_name: linux-64bit
          - target: linux-with-shared-libraries
            os: ubuntu-latest
            suffix: linux-with-shared-libraries
            output_name: linux-with-shared-libraries

          # Cross-Compiled Embedded Deployments (Mapped from reference footprints)
          - target: armlinux
            os: ubuntu-latest
            suffix: armlinux
            output_name: armlinux
          - target: raspberrypi
            os: ubuntu-latest
            suffix: raspberrypi
            output_name: raspberrypi

          # BSD UNIX Matrix Targets
          - target: freebsd
            os: ubuntu-latest
            suffix: freebsd-no-openssl
            output_name: freebsd
          - target: openbsd
            os: ubuntu-latest
            suffix: openbsd
            output_name: openbsd

          # Windows Cross-Compiler Target (Mapped from reference footings)
          - target: mingw
            os: ubuntu-latest
            suffix: mingw
            output_name: mingw

          # Apple Darwin Native Toolchain Targets
          - target: macosx-bigsur
            os: macos-latest
            suffix: macosx-no-openssl
            output_name: macosx-bigsur
          - target: iphoneos
            os: macos-latest
            suffix: macosx-no-openssl
            output_name: iphoneos

    steps:
      - name: Checkout Tagged Release Source Baseline
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # actions/checkout@v4.2.2
        with:
          ref: refs/tags/v${{ needs.sync-upstream.outputs.version }}

      - name: Setup Compiler Cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.cache/ccache
          key: matrix-${{ matrix.target }}-ccache-${{ needs.sync-upstream.outputs.version }}
          restore-keys: matrix-${{ matrix.target }}-ccache-

      - name: Provision Multi-Arch Host Toolchains (Linux Worker Nodes)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache gcc-arm-linux-gnueabi g++-arm-linux-gnueabi mingw-w64

      - name: Universal C++20 Injection and Platform Build
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          export CCACHE_DIR=~/.cache/ccache
          
          # Cross-Compiler Environment Routing
          if [[ "${{ matrix.target }}" == "armlinux" ]]; then
            export CROSS_COMPILE=arm-linux-gnueabi-
          elif [[ "${{ matrix.target }}" == "mingw" ]]; then
            export CC=x86_64-w64-mingw32-gcc
            export CXX=x86_64-w64-mingw32-g++
            export LD=x86_64-w64-mingw32-ld
          fi

          # Target configuration file manipulation routing
          # Use portable sed logic for macOS/Linux compatibility
          sed -i.bak 's/^COMPILE_OPTS.*/& -std=c++20/' config.${{ matrix.suffix }}
          
          # Force NO_OPENSSL for cross-compilers without dedicated no-openssl configs
          if [[ "${{ matrix.target }}" == "armlinux" || "${{ matrix.target }}" == "mingw" ]]; then
            sed -i.bak 's/^COMPILE_OPTS.*/& -DNO_OPENSSL=1/' config.${{ matrix.suffix }}
            # Strip openssl libraries from the link line for MinGW
            if [[ "${{ matrix.target }}" == "mingw" ]]; then
              sed -i.bak 's/-lssl -lcrypto//' config.mingw
            fi
          fi
          
          ./genMakefiles ${{ matrix.suffix }}
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Execute Local Staging Extraction
        run: |
          mkdir -p local_staging
          make install DESTDIR="$(pwd)/local_staging" PREFIX=/usr/local

      - name: Stage Artifact Payload for Packaging
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: compiled-binaries-${{ matrix.output_name }}
          path: ./local_staging/usr/local/
          retention-days: 1

  publish-release:
    needs: [sync-upstream, build-matrix]
    if: needs.sync-upstream.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    name: Package and Publish Universal GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Explicitly required to post attachments onto GitHub Release objects
    steps:
      - name: Download Aggregated Binary Artifacts
        uses: actions/download-artifact@cc200ea28ba4524672103da300819ee10fa797d9 # v4.1.9
        with:
          path: ./downloaded-payloads

      - name: Assemble Release Assets Archive Tree
        run: |
          mkdir -p ./release-tarballs
          
          for dir in ./downloaded-payloads/compiled-binaries-*; do
            if [ -d "$dir" ]; then
              # Isolate the structured target runtime token
              PLATFORM_TOKEN=$(basename "$dir" | sed 's/compiled-binaries-//')
              
              # Compress target payloads down into distribution archives
              tar -czvf "./release-tarballs/live555-${PLATFORM_TOKEN}-${{ needs.sync-upstream.outputs.version }}.tar.gz" -C "$dir" .
            fi
          done

      - name: Generate Production Release and Attach Assets
        uses: softprops/action-gh-release@c95fe146a3debc61da83ff3260137f1de03f952b # softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.sync-upstream.outputs.version }}
          name: Live555 Production Release v${{ needs.sync-upstream.outputs.version }}
          files: ./release-tarballs/*.tar.gz
          body: |
            ### Automated Production Binary Matrix
            Universal automated cross-compiled build output matching upstream release version `v${{ needs.sync-upstream.outputs.version }}`.
            
            * **Compiler Standard**: Verified compliance under explicit C++20 configuration directives.
            * **Build Engine Architecture**: Decoupled parallel processing blocks optimized via multi-thread execution.
            * **Binary Strategy**: Artifact optimization handled cleanly outside the active Git source branch topology.
