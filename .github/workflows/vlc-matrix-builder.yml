name: VLC Matrix Builder (Live555 Support)

on:
  workflow_run:
    workflows: ["Universal Cross-Platform Matrix Release Engine"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force a complete rebuild of all targets'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-vlc:
    name: Build VLC (${{ matrix.target }} - ${{ matrix.track }})
    runs-on: ${{ matrix.os }}
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux Targets ---
          - target: linux-x64
            os: ubuntu-latest
            live555_suffix: linux-64bit
            host: x86_64-linux-gnu
            track: dev
            vlc_ref: master
          - target: linux-x64
            os: ubuntu-latest
            live555_suffix: linux-64bit
            host: x86_64-linux-gnu
            track: stable
            vlc_ref: latest_tag

          # --- Apple Darwin Targets ---
          - target: macos-x64
            os: macos-latest
            live555_suffix: macosx-no-openssl
            host: x86_64-apple-darwin
            track: dev
            vlc_ref: master
          - target: macos-x64
            os: macos-latest
            live555_suffix: macosx-no-openssl
            host: x86_64-apple-darwin
            track: stable
            vlc_ref: latest_tag

    steps:
      - name: Checkout Primary Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: main-repo

      - name: Resolve VLC Source Reference
        id: vlc-source
        working-directory: main-repo
        run: |
          if [[ "${{ matrix.vlc_ref }}" == "latest_tag" ]]; then
            # Navigate to VLC source to find tags
            cd source/vlc
            git fetch --tags
            LATEST_TAG=$(git tag -l "3.0.*" | sort -V | tail -n 1)
            if [ -z "$LATEST_TAG" ]; then LATEST_TAG=$(git tag -l | sort -V | tail -n 1); fi
            echo "resolved_ref=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "VLC_BRANCH=$LATEST_TAG" >> $GITHUB_ENV
          else
            echo "resolved_ref=${{ matrix.vlc_ref }}" >> $GITHUB_OUTPUT
            echo "VLC_BRANCH=${{ matrix.vlc_ref }}" >> $GITHUB_ENV
          fi

      - name: Prepare VLC Workspace
        run: |
          mkdir -p vlc-workspace
          # Sync the requested VLC version into the workspace
          # We use the staged source/vlc as a base to save bandwidth
          rsync -av --exclude '.git' main-repo/source/vlc/ vlc-workspace/
          cd vlc-workspace
          git init
          git remote add origin https://github.com/videolan/vlc.git
          git fetch origin ${{ steps.vlc-source.outputs.resolved_ref }} --depth 1
          git checkout FETCH_HEAD

      - name: Provision VLC Build Environment (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential pkg-config libtool automake autoconf gettext \
            flex bison lua5.2 liblua5.2-dev libmad0-dev libavcodec-dev \
            libavformat-dev libswscale-dev libpostproc-dev liba52-0.7.4-dev \
            libmpeg2-4-dev libvorbis-dev libogg-dev libtheora-dev libshout3-dev \
            libspeex-dev libtwolame-dev libx264-dev libva-dev libdrm-dev \
            libxcb1-dev libxcb-shm0-dev libxcb-xv0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-composite0-dev libxcb-render0-dev \
            libxcb-image0-dev libxcb-util0-dev libxcb-xkb-dev libxkbcommon-x11-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libidn11-dev

      - name: Provision VLC Build Environment (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install autoconf automake libtool gettext pkg-config lua

      - name: Extract Versions and Synthesize Live555 Pkg-Config
        id: meta
        run: |
          # Metadata Extraction
          VLC_VERSION=$(grep "AC_INIT" vlc-workspace/configure.ac | head -n 1 | cut -d'[' -f3 | cut -d']' -f1)
          if [ -z "$VLC_VERSION" ]; then VLC_VERSION="${{ steps.vlc-source.outputs.resolved_ref }}"; fi
          
          # Find latest Live555 version in the main repo
          LIVE555_VERSION=$(ls main-repo/compiled/ | sort -r | head -n 1)
          LIVE555_PATH="$(pwd)/main-repo/compiled/$LIVE555_VERSION/${{ matrix.live555_suffix }}"
          
          echo "vlc_version=$VLC_VERSION" >> $GITHUB_OUTPUT
          echo "live555_version=$LIVE555_VERSION" >> $GITHUB_OUTPUT
          
          # Create pkg-config file
          mkdir -p /tmp/pkgconfig
          cat <<EOF > /tmp/pkgconfig/live555.pc
prefix=$LIVE555_PATH
exec_prefix=\${prefix}
libdir=\${exec_prefix}/lib
includedir=\${prefix}/include

Name: live555
Description: Multimedia streaming libraries (VLC Build)
Version: $LIVE555_VERSION
Cflags: -I\${includedir}/liveMedia -I\${includedir}/groupsock -I\${includedir}/BasicUsageEnvironment -I\${includedir}/UsageEnvironment
Libs: -L\${libdir} -lliveMedia -lgroupsock -lBasicUsageEnvironment -lUsageEnvironment
EOF
          echo "PKG_CONFIG_PATH=/tmp/pkgconfig" >> $GITHUB_ENV

      - name: Bootstrap VLC Build System
        working-directory: vlc-workspace
        run: ./bootstrap

      - name: Configure VLC with Live555
        working-directory: vlc-workspace
        run: |
          ./configure \
            --prefix=$(pwd)/install \
            --host=${{ matrix.host }} \
            --enable-live555 \
            --disable-qt \
            --disable-skins2 \
            --disable-nls \
            --disable-vlc \
            --disable-vlc-wrapper \
            --disable-lua

      - name: Compile VLC Core and Plugins
        working-directory: vlc-workspace
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu || echo 2)

      - name: Extract Build Artifacts
        working-directory: vlc-workspace
        run: make install

      - name: Package VLC Binary Distribution
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: vlc-${{ steps.meta.outputs.vlc_version }}-live555-${{ steps.meta.outputs.live555_version }}-${{ matrix.target }}
          path: ./vlc-workspace/install/
          retention-days: 7
