name: Monitor, Verify, and Update Live555

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# The single source of truth for the domain across the entire script
env:
  BASE_URL: "https://download.live555.com"

permissions:
  contents: write

jobs:
  check-verify-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Source Directory
        run: mkdir -p ./source

      - name: Check Changelog for Updates
        id: check_changelog
        run: |
          curl -sSL "${{ env.BASE_URL }}/changelog.txt" -o current_changelog.txt
          
          REMOTE_HASH=$(md5sum current_changelog.txt | awk '{print $1}')
          
          if [ -f .github/tracking/changelog.md5 ]; then
            LOCAL_HASH=$(cat .github/tracking/changelog.md5)
          else
            LOCAL_HASH=""
          fi

          if [ "$REMOTE_HASH" != "$LOCAL_HASH" ]; then
            echo "CHANGED=true" >> $GITHUB_ENV
            mkdir -p .github/tracking
            echo "$REMOTE_HASH" > .github/tracking/changelog.md5
            mv current_changelog.txt ./source/changelog.txt
          else
            echo "CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Download and Verify Artifacts
        if: env.CHANGED == 'true'
        run: |
          cd ./source

          # Live555 utilizes MD5, not SHA1
          curl -sSL "${{ env.BASE_URL }}/live555-latest.tar.gz" -o live555-latest.tar.gz
          curl -sSL "${{ env.BASE_URL }}/live555-latest-md5.txt" -o live555-latest-md5.txt

          # Hash format is 'md5 <hash> <filename>', so we extract $2
          EXPECTED_MD5=$(awk '{print $2}' live555-latest-md5.txt)
          CALCULATED_MD5=$(md5sum live555-latest.tar.gz | awk '{print $1}')

          if [ "$EXPECTED_MD5" != "$CALCULATED_MD5" ]; then
            echo "::error::Checksum verification failed! Expected: $EXPECTED_MD5, Got: $CALCULATED_MD5"
            exit 1
          fi

          # Strip trailing colons from the changelog string using -Eo
          VERSION_DATE=$(grep -Eo '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}' changelog.txt | head -n 1)
          
          # Fix date bug (%m.%m -> %m.%d)
          if [ -z "$VERSION_DATE" ]; then
            VERSION_DATE=$(date +%Y.%m.%d)
          fi
          
          echo "VERSION_DATE=$VERSION_DATE" >> $GITHUB_ENV
          
          curl -sSL "${{ env.BASE_URL }}/live.${VERSION_DATE}.tar.gz" -o "live.${VERSION_DATE}.tar.gz"

          rm -rf live-latest
          rm -rf "live-${VERSION_DATE}"
          mkdir -p live-latest
          mkdir -p "live-${VERSION_DATE}"

          tar -xf live555-latest.tar.gz --strip-components=1 -C live-latest
          tar -xf "live.${VERSION_DATE}.tar.gz" --strip-components=1 -C "live-${VERSION_DATE}"

      - name: Compile Live555
        if: env.CHANGED == 'true'
        run: |
          cd ./source/live-latest
          ./genMakefiles linux
          make -j$(nproc)

      - name: Commit and Push to Repo
        if: env.CHANGED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .github/tracking/changelog.md5
          git add ./source/
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "build(live555): update and compile version ${{ env.VERSION_DATE }}"
            git push
          else
            echo "No changes to commit."
          fi
