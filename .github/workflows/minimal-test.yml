name: Printf Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Synthesize Pkg-Config
        run: |
          LIVE555_PATH="/tmp/live555"
          LIVE555_VERSION="v2026.06.12"
          L555_LIBS="-lliveMedia"
          
          mkdir -p /tmp/pkgconfig
          printf "prefix=%s\nexec_prefix=\${prefix}\nlibdir=\${exec_prefix}/lib\nincludedir=\${prefix}/include\n\nName: live555\nDescription: Multimedia streaming libraries\nVersion: %s\nCflags: -I\${includedir}/liveMedia\nLibs: -L\${libdir} %s\n" \
            "$LIVE555_PATH" "$LIVE555_VERSION" "$L555_LIBS" > /tmp/pkgconfig/live555.pc
          
          cat /tmp/pkgconfig/live555.pc
