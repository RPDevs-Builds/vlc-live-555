name: VLC Builder Final

on:
  workflow_dispatch:
    inputs:
      track_input:
        description: 'VLC Track to build (dev, stable, or both)'
        required: false
        default: 'both'
  push:
    branches: [main]

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          TRACK_INPUT="${{ github.event.inputs.track_input }}"
          EVENT_NAME="${{ github.event_name }}"
          
          if [ "$EVENT_NAME" = "push" ] || [ "$TRACK_INPUT" = "both" ] || [ -z "$TRACK_INPUT" ]; then
            TRACKS='["dev", "stable"]'
          else
            TRACKS="[\"$TRACK_INPUT\"]"
          fi
          
          echo "matrix={\"target\": [\"linux-x64\", \"armlinux\", \"raspberrypi\", \"win64\", \"macos-x64\"], \"track\": $TRACKS}" >> $GITHUB_OUTPUT

  build-vlc:
    needs: setup-matrix
    name: Build VLC (${{ matrix.target }} - ${{ matrix.track }})
    runs-on: ${{ matrix.target == 'macos-x64' && 'macos-latest' || fromJSON('["self-hosted", "vlc-builder"]') }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Checkout Primary Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: main-repo
          fetch-depth: 0

      - name: Ensure Tags Exist
        working-directory: main-repo
        run: git fetch --tags

      - name: Install System Dependencies (Hosted macOS)
        if: ${{ runner.os == 'macOS' }}
        run: |
          brew install autoconf automake libtool gettext pkg-config lua

      - name: Configure Target Variables
        id: target-vars
        run: |
          case "${{ matrix.target }}" in
            linux-x64)
              echo "live555_suffix=linux-64bit" >> $GITHUB_OUTPUT
              echo "host=x86_64-linux-gnu" >> $GITHUB_OUTPUT
              ;;
            armlinux)
              echo "live555_suffix=armlinux" >> $GITHUB_OUTPUT
              echo "host=arm-linux-gnueabi" >> $GITHUB_OUTPUT
              ;;
            raspberrypi)
              echo "live555_suffix=raspberrypi" >> $GITHUB_OUTPUT
              echo "host=arm-linux-gnueabihf" >> $GITHUB_OUTPUT
              ;;
            win64)
              echo "live555_suffix=mingw" >> $GITHUB_OUTPUT
              echo "host=x86_64-w64-mingw32" >> $GITHUB_OUTPUT
              ;;
            macos-x64)
              echo "live555_suffix=macosx-no-openssl" >> $GITHUB_OUTPUT
              echo "host=x86_64-apple-darwin" >> $GITHUB_OUTPUT
              ;;
          esac

          if [ "${{ matrix.track }}" = "dev" ]; then
            echo "vlc_ref=master" >> $GITHUB_OUTPUT
          else
            echo "vlc_ref=latest_tag" >> $GITHUB_OUTPUT
          fi

      - name: Resolve VLC Source Reference
        id: vlc-source
        working-directory: main-repo
        run: |
          VLC_REF="${{ steps.target-vars.outputs.vlc_ref }}"
          echo "resolved_ref=main" >> $GITHUB_OUTPUT

      - name: Prepare VLC Workspace
        run: |
          mkdir -p vlc-workspace
          if [ -d "main-repo/source/vlc" ]; then
            rsync -av main-repo/source/vlc/ vlc-workspace/
          fi
          cd vlc-workspace
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://github.com/videolan/vlc.git
          else
            git remote set-url origin https://github.com/videolan/vlc.git
          fi
          git fetch origin ${{ steps.vlc-source.outputs.resolved_ref }} --depth 1
          git checkout -f FETCH_HEAD

      - name: Extract Versions and Synthesize Live555 Pkg-Config
        id: meta
        run: |
          VLC_VERSION=$(grep "AC_INIT" vlc-workspace/configure.ac | head -n 1 | cut -d'[' -f3 | cut -d']' -f1)
          if [ -z "$VLC_VERSION" ]; then VLC_VERSION="${{ steps.vlc-source.outputs.resolved_ref }}"; fi
          
          # Support new directory structure first, fallback to old
          if [ -d "main-repo/compiled/${{ steps.target-vars.outputs.live555_suffix }}/live555" ]; then
            LIVE555_VERSION=$(ls "main-repo/compiled/${{ steps.target-vars.outputs.live555_suffix }}/live555/" | sort -r | head -n 1)
            LIVE555_PATH="$(pwd)/main-repo/compiled/${{ steps.target-vars.outputs.live555_suffix }}/live555/$LIVE555_VERSION"
          else
            LIVE555_VERSION=$(ls main-repo/compiled/ | grep -E '^[0-9]' | sort -r | head -n 1)
            LIVE555_PATH="$(pwd)/main-repo/compiled/$LIVE555_VERSION/${{ steps.target-vars.outputs.live555_suffix }}"
          fi
          
          L555_CONFIG="main-repo/source/live555/config.${{ steps.target-vars.outputs.live555_suffix }}"
          L555_LIBS="-lliveMedia -lgroupsock -lBasicUsageEnvironment -lUsageEnvironment"
          
          if [ -f "$L555_CONFIG" ] && grep -q "lssl" "$L555_CONFIG"; then
            L555_LIBS="$L555_LIBS -lssl -lcrypto"
          fi

          echo "vlc_version=$VLC_VERSION" >> $GITHUB_OUTPUT
          echo "live555_version=$LIVE555_VERSION" >> $GITHUB_OUTPUT
          
          mkdir -p /tmp/pkgconfig
          printf "prefix=%s\nexec_prefix=\${prefix}\nlibdir=\${exec_prefix}/lib\nincludedir=\${prefix}/include\n\nName: live555\nDescription: Multimedia streaming libraries\nVersion: %s\nCflags: -I\${includedir}/liveMedia -I\${includedir}/groupsock -I\${includedir}/BasicUsageEnvironment -I\${includedir}/UsageEnvironment\nLibs: -L\${libdir} %s\n" \
            "$LIVE555_PATH" "$LIVE555_VERSION" "$L555_LIBS" > /tmp/pkgconfig/live555.pc
          
          echo "PKG_CONFIG_PATH=/tmp/pkgconfig" >> $GITHUB_ENV

      - name: Bootstrap
        working-directory: vlc-workspace
        run: ./bootstrap

      - name: Configure
        working-directory: vlc-workspace
        run: |
          ./configure \
            --prefix=$(pwd)/install \
            --host=${{ steps.target-vars.outputs.host }} \
            --enable-live555 \
            --disable-qt \
            --disable-skins2 \
            --disable-nls \
            --disable-vlc \
            --disable-vlc-wrapper \
            --disable-lua \
            ${VLC_CONFIGURE_FLAGS:-}

      - name: Compile
        working-directory: vlc-workspace
        run: make -j${MAKE_JOBS:-$(nproc 2>/dev/null || sysctl -n hw.ncpu || echo 2)}

      - name: Extract Artifacts
        working-directory: vlc-workspace
        run: |
          make install
          mkdir -p packaged-artifacts
          
          echo "${{ steps.meta.outputs.vlc_version }}" > packaged-artifacts/vlc_version.txt
          
          # 1. Package Raw Binaries
          TARBALL_NAME="vlc-${{ steps.meta.outputs.vlc_version }}-live555-${{ steps.meta.outputs.live555_version }}-${{ matrix.target }}-${{ matrix.track }}.tar.gz"
          tar -czvf "$TARBALL_NAME" -C install .
          mv "$TARBALL_NAME" packaged-artifacts/
          
          # 2. Package Native Installers
          if [[ "${{ matrix.target }}" == "win64" ]]; then
             make package-win32-zip || echo "ZIP package failed"
             make package-win32-exe || echo "EXE package failed"
             cp vlc-*.exe packaged-artifacts/ 2>/dev/null || true
             cp vlc-*.zip packaged-artifacts/ 2>/dev/null || true
          elif [[ "${{ matrix.target }}" == "macos-x64" ]]; then
             make package-macosx || echo "macOS package failed"
             cp vlc-*.dmg packaged-artifacts/ 2>/dev/null || true
          fi

      - name: Upload
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: vlc-artifacts-${{ matrix.target }}-${{ matrix.track }}
          path: ./vlc-workspace/packaged-artifacts/
          retention-days: 7

  publish-release:
    needs: [build-vlc]
    name: Package and Publish VLC Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout Repository for Binary Commitment
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Download Aggregated Binary Artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          path: ./downloaded-payloads

      - name: Assemble Release Assets and Repository Tree
        run: |
          for dir in ./downloaded-payloads/vlc-artifacts-*; do
            if [ -d "$dir" ]; then
              BASENAME=$(basename "$dir")
              TRACK=${BASENAME##*-}
              TARGET=${BASENAME#vlc-artifacts-}
              TARGET=${TARGET%-$TRACK}
              
              if [ -f "$dir/vlc_version.txt" ]; then
                VERSION=$(cat "$dir/vlc_version.txt")
                rm "$dir/vlc_version.txt"
                
                OS_DIR="compiled/$TARGET/vlc/$VERSION-$TRACK"
                mkdir -p "$OS_DIR"
                cp -r "$dir"/* "$OS_DIR/"
                
                # Copy to root for release attachment
                cp "$dir"/* .
              fi
            fi
          done

      - name: Commit and Push Compiled Binaries to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add compiled/
          if ! git diff-index --quiet HEAD; then
            git commit -m "build: automated VLC matrix compilation and packaging"
            git pull origin main --rebase
            git push origin main
          fi

      - name: Generate Production Release and Attach Assets
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: vlc-latest
          name: VLC Automated Matrix Build
          files: |
            *.tar.gz
            *.exe
            *.zip
            *.dmg
          body: |
            ### Automated Production Binary Matrix
            Universal automated cross-compiled build output for VLC.
