name: Build Linux x64 (Mint/Ubuntu/RPM)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  BASE_URL: "https://download.live555.com"

permissions:
  contents: write

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Source Directory
        run: mkdir -p ./source

      - name: Check Changelog for Updates
        id: check_changelog
        run: |
          curl -sSL "${{ env.BASE_URL }}/changelog.txt" -o current_changelog.txt
          
          REMOTE_HASH=$(md5sum current_changelog.txt | awk '{print $1}')
          
          if [ -f .github/tracking/changelog.md5 ]; then
            LOCAL_HASH=$(cat .github/tracking/changelog.md5)
          else
            LOCAL_HASH=""
          fi

          if [ "$REMOTE_HASH" != "$LOCAL_HASH" ]; then
            echo "CHANGED=true" >> $GITHUB_ENV
            mkdir -p .github/tracking
            echo "$REMOTE_HASH" > .github/tracking/changelog.md5
            mv current_changelog.txt ./source/changelog.txt
          else
            echo "CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Setup Compiler Cache (ccache)
        if: env.CHANGED == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-live555-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-live555-ccache-

      - name: Install FPM, Ccache, and Dependencies
        if: env.CHANGED == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems rpm build-essential ccache
          sudo gem install --no-document fpm

      - name: Download and Verify Artifacts
        if: env.CHANGED == 'true'
        run: |
          cd ./source

          curl -fsSL "${{ env.BASE_URL }}/live555-latest.tar.gz" -o live555-latest.tar.gz
          curl -fsSL "${{ env.BASE_URL }}/live555-latest-sha1.txt" -o live555-latest-sha1.txt

          EXPECTED_SHA1=$(awk '{print $1}' live555-latest-sha1.txt)
          CALCULATED_SHA1=$(sha1sum live555-latest.tar.gz | awk '{print $1}')

          if [ "$EXPECTED_SHA1" != "$CALCULATED_SHA1" ]; then
            echo "::error::Checksum verification failed! Expected: $EXPECTED_SHA1, Got: $CALCULATED_SHA1"
            exit 1
          fi

          VERSION_DATE=$(grep -m 1 -Eo '[0-9]{4}-[0-9]{2}-[0-9]{2}' changelog.txt | tr '-' '.')
          
          if [ -z "$VERSION_DATE" ]; then
            VERSION_DATE=$(tar -xOf live555-latest.tar.gz live/liveMedia/include/liveMedia_version.hh | grep -m 1 -Eo '[0-9]{4}\.[0-9]{2}\.[0-9]{2}')
          fi
          
          echo "VERSION_DATE=$VERSION_DATE" >> $GITHUB_ENV
          
          curl -fsSL "${{ env.BASE_URL }}/live.${VERSION_DATE}.tar.gz" -o "live.${VERSION_DATE}.tar.gz"

          rm -rf live-latest
          rm -rf "live-${VERSION_DATE}"
          mkdir -p live-latest
          mkdir -p "live-${VERSION_DATE}"

          tar -xf live555-latest.tar.gz --strip-components=1 -C live-latest
          tar -xf "live.${VERSION_DATE}.tar.gz" --strip-components=1 -C "live-${VERSION_DATE}"

      - name: Compile and Stage Live555
        if: env.CHANGED == 'true'
        run: |
          cd ./source/live-latest
          
          # Initialize compiler cache targeting
          export PATH="/usr/lib/ccache:$PATH"
          export CCACHE_DIR=~/.cache/ccache
          ccache -z
          
          # Inject C++20 standard requirement to support std::atomic_flag::test()
          sed -i 's/^COMPILE_OPTS.*/& -std=c++20/' config.linux
          
          # Redirect installation path to a local staging directory for clean packaging
          STAGING_DIR="$(pwd)/staging"
          mkdir -p "$STAGING_DIR/usr/local"
          sed -i "s|^PREFIX = .*|PREFIX = $STAGING_DIR/usr/local|" config.linux
          
          ./genMakefiles linux
          make -j$(nproc)
          
          # Install to the staging directory instead of the runner's root OS
          make install
          
          # Print cache statistics
          ccache -s

      - name: Generate System Installers (DEB, RPM, TAR)
        if: env.CHANGED == 'true'
        run: |
          cd ./source/live-latest
          mkdir -p ../../installers
          
          # Generate Linux Mint / Ubuntu / Debian .deb package
          fpm -s dir -t deb \
            -n live555 \
            -v ${{ env.VERSION_DATE }} \
            --architecture amd64 \
            --maintainer "Automated Build" \
            --description "Live555 Streaming Media libraries and utilities" \
            -C staging \
            usr/
          
          # Generate Fedora / RHEL / SUSE .rpm package
          fpm -s dir -t rpm \
            -n live555 \
            -v ${{ env.VERSION_DATE }} \
            --architecture amd64 \
            --maintainer "Automated Build" \
            --description "Live555 Streaming Media libraries and utilities" \
            -C staging \
            usr/

          # Move compiled installers to artifact directory
          mv *.deb ../../installers/
          mv *.rpm ../../installers/
          
          # Create a raw pre-compiled tarball for manual installations
          cd staging
          tar -czvf ../../../installers/live555-linux-amd64-${{ env.VERSION_DATE }}.tar.gz usr/

      - name: Upload Installer Artifacts
        if: env.CHANGED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live555-linux-installers-${{ env.VERSION_DATE }}
          path: ./installers/*
          retention-days: 30

      - name: Commit and Push Tracking Updates
        if: env.CHANGED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .github/tracking/changelog.md5
          git add ./source/
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "build(live555): update, compile, and package Linux version ${{ env.VERSION_DATE }}"
            git push
          else
            echo "No changes to commit."
          fi
