name: VLC Builder Final

on:
  workflow_dispatch:
    inputs:
      track_input:
        description: 'VLC Track to build (dev, stable, or both)'
        required: false
        default: 'both'
  push:
    branches: [main]

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          TRACK_INPUT="${{ github.event.inputs.track_input }}"
          EVENT_NAME="${{ github.event_name }}"
          
          if [ "$EVENT_NAME" = "push" ] || [ "$TRACK_INPUT" = "both" ] || [ -z "$TRACK_INPUT" ]; then
            TRACKS='["dev", "stable"]'
          else
            TRACKS="[\"$TRACK_INPUT\"]"
          fi
          
          echo "matrix={\"target\": [\"linux-x64\", \"armlinux\", \"raspberrypi\", \"win64\", \"macos-x64\"], \"track\": $TRACKS}" >> $GITHUB_OUTPUT

  build-vlc:
    needs: setup-matrix
    name: Build VLC (${{ matrix.target }} - ${{ matrix.track }})
    runs-on: ${{ matrix.target == 'macos-x64' && 'macos-latest' || fromJSON('["self-hosted", "vlc-builder"]') }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Checkout Primary Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: main-repo

      - name: Install System Dependencies (Hosted macOS)
        if: ${{ runner.os == 'macOS' }}
        run: |
          brew install autoconf automake libtool gettext pkg-config lua

      - name: Configure Target Variables
        id: target-vars
        run: |
          case "${{ matrix.target }}" in
            linux-x64)
              echo "live555_suffix=linux-64bit" >> $GITHUB_OUTPUT
              echo "host=x86_64-linux-gnu" >> $GITHUB_OUTPUT
              ;;
            armlinux)
              echo "live555_suffix=armlinux" >> $GITHUB_OUTPUT
              echo "host=arm-linux-gnueabi" >> $GITHUB_OUTPUT
              ;;
            raspberrypi)
              echo "live555_suffix=raspberrypi" >> $GITHUB_OUTPUT
              echo "host=arm-linux-gnueabihf" >> $GITHUB_OUTPUT
              ;;
            win64)
              echo "live555_suffix=mingw" >> $GITHUB_OUTPUT
              echo "host=x86_64-w64-mingw32" >> $GITHUB_OUTPUT
              ;;
            macos-x64)
              echo "live555_suffix=macosx-no-openssl" >> $GITHUB_OUTPUT
              echo "host=x86_64-apple-darwin" >> $GITHUB_OUTPUT
              ;;
          esac

          if [ "${{ matrix.track }}" = "dev" ]; then
            echo "vlc_ref=master" >> $GITHUB_OUTPUT
          else
            echo "vlc_ref=latest_tag" >> $GITHUB_OUTPUT
          fi

      - name: Resolve VLC Source Reference
        id: vlc-source
        working-directory: main-repo
        run: |
          VLC_REF="${{ steps.target-vars.outputs.vlc_ref }}"
          if [ "$VLC_REF" = "latest_tag" ]; then
            cd source/vlc
            git fetch --tags
            LATEST_TAG=$(git tag -l "3.0.*" | sort -V | tail -n 1)
            if [ -z "$LATEST_TAG" ]; then LATEST_TAG=$(git tag -l | sort -V | tail -n 1); fi
            echo "resolved_ref=$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "resolved_ref=$VLC_REF" >> $GITHUB_OUTPUT
          fi

      - name: Prepare VLC Workspace
        run: |
          mkdir -p vlc-workspace
          if [ -d "main-repo/source/vlc" ]; then
            rsync -av main-repo/source/vlc/ vlc-workspace/
          fi
          cd vlc-workspace
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://github.com/videolan/vlc.git
          else
            git remote set-url origin https://github.com/videolan/vlc.git
          fi
          git fetch origin ${{ steps.vlc-source.outputs.resolved_ref }} --depth 1
          git checkout -f FETCH_HEAD

      - name: Extract Versions and Synthesize Live555 Pkg-Config
        id: meta
        run: |
          VLC_VERSION=$(grep "AC_INIT" vlc-workspace/configure.ac | head -n 1 | cut -d'[' -f3 | cut -d']' -f1)
          if [ -z "$VLC_VERSION" ]; then VLC_VERSION="${{ steps.vlc-source.outputs.resolved_ref }}"; fi
          
          LIVE555_VERSION=$(ls main-repo/compiled/ | sort -r | head -n 1)
          LIVE555_PATH="$(pwd)/main-repo/compiled/$LIVE555_VERSION/${{ steps.target-vars.outputs.live555_suffix }}"
          
          L555_CONFIG="main-repo/source/live555/config.${{ steps.target-vars.outputs.live555_suffix }}"
          L555_LIBS="-lliveMedia -lgroupsock -lBasicUsageEnvironment -lUsageEnvironment"
          
          if [ -f "$L555_CONFIG" ] && grep -q "lssl" "$L555_CONFIG"; then
            L555_LIBS="$L555_LIBS -lssl -lcrypto"
          fi

          echo "vlc_version=$VLC_VERSION" >> $GITHUB_OUTPUT
          echo "live555_version=$LIVE555_VERSION" >> $GITHUB_OUTPUT
          
          mkdir -p /tmp/pkgconfig
          printf "prefix=%s\nexec_prefix=\${prefix}\nlibdir=\${exec_prefix}/lib\nincludedir=\${prefix}/include\n\nName: live555\nDescription: Multimedia streaming libraries\nVersion: %s\nCflags: -I\${includedir}/liveMedia -I\${includedir}/groupsock -I\${includedir}/BasicUsageEnvironment -I\${includedir}/UsageEnvironment\nLibs: -L\${libdir} %s\n" \
            "$LIVE555_PATH" "$LIVE555_VERSION" "$L555_LIBS" > /tmp/pkgconfig/live555.pc
          
          echo "PKG_CONFIG_PATH=/tmp/pkgconfig" >> $GITHUB_ENV

      - name: Bootstrap
        working-directory: vlc-workspace
        run: ./bootstrap

      - name: Configure
        working-directory: vlc-workspace
        run: |
          ./configure \
            --prefix=$(pwd)/install \
            --host=${{ steps.target-vars.outputs.host }} \
            --enable-live555 \
            --disable-qt \
            --disable-skins2 \
            --disable-nls \
            --disable-vlc \
            --disable-vlc-wrapper \
            --disable-lua

      - name: Compile
        working-directory: vlc-workspace
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu || echo 2)

      - name: Extract Artifacts
        working-directory: vlc-workspace
        run: make install

      - name: Upload
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: vlc-${{ steps.meta.outputs.vlc_version }}-live555-${{ steps.meta.outputs.live555_version }}-${{ matrix.target }}-${{ matrix.track }}
          path: ./vlc-workspace/install/
          retention-days: 7
