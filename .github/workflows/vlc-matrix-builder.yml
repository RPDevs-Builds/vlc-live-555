name: VLC Matrix Builder (Live555 Support)

on:
  workflow_run:
    workflows: ["Universal Cross-Platform Matrix Release Engine"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-vlc:
    name: Build VLC (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary Linux Target
          - target: linux-x64
            os: ubuntu-latest
            live555_suffix: linux-64bit
            host: x86_64-linux-gnu

          # Apple Darwin Target
          - target: macos-x64
            os: macos-latest
            live555_suffix: macosx-no-openssl
            host: x86_64-apple-darwin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Provision VLC Build Environment (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential pkg-config libtool automake autoconf gettext \
            flex bison lua5.2 liblua5.2-dev libmad0-dev libavcodec-dev \
            libavformat-dev libswscale-dev libpostproc-dev liba52-0.7.4-dev \
            libmpeg2-4-dev libvorbis-dev libogg-dev libtheora-dev libshout3-dev \
            libspeex-dev libtwolame-dev libx264-dev libva-dev libdrm-dev \
            libxcb1-dev libxcb-shm0-dev libxcb-xv0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-composite0-dev libxcb-render0-dev \
            libxcb-image0-dev libxcb-util0-dev libxcb-xkb-dev libxkbcommon-x11-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libidn11-dev

      - name: Provision VLC Build Environment (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install autoconf automake libtool gettext pkg-config lua

      - name: Extract Versions and Synthesize Live555 Pkg-Config
        id: meta
        run: |
          # Metadata Extraction
          VLC_VERSION=$(grep "AC_INIT" source/vlc/configure.ac | head -n 1 | cut -d'[' -f3 | cut -d']' -f1)
          if [ -z "$VLC_VERSION" ]; then VLC_VERSION="unknown"; fi
          
          LIVE555_VERSION=$(ls compiled/ | sort -r | head -n 1)
          LIVE555_PATH="$(pwd)/compiled/$LIVE555_VERSION/${{ matrix.live555_suffix }}"
          
          echo "vlc_version=$VLC_VERSION" >> $GITHUB_OUTPUT
          echo "live555_version=$LIVE555_VERSION" >> $GITHUB_OUTPUT
          echo "path=$LIVE555_PATH" >> $GITHUB_OUTPUT
          
          # Create pkg-config file
          mkdir -p /tmp/pkgconfig
          cat <<EOF > /tmp/pkgconfig/live555.pc
prefix=$LIVE555_PATH
exec_prefix=\${prefix}
libdir=\${exec_prefix}/lib
includedir=\${prefix}/include

Name: live555
Description: Multimedia streaming libraries (VLC build)
Version: $LIVE555_VERSION
Cflags: -I\${includedir}/liveMedia -I\${includedir}/groupsock -I\${includedir}/BasicUsageEnvironment -I\${includedir}/UsageEnvironment
Libs: -L\${libdir} -lliveMedia -lgroupsock -lBasicUsageEnvironment -lUsageEnvironment
EOF
          echo "PKG_CONFIG_PATH=/tmp/pkgconfig" >> $GITHUB_ENV

      - name: Bootstrap VLC Build System
        working-directory: ./source/vlc
        run: ./bootstrap

      - name: Configure VLC with Live555
        working-directory: ./source/vlc
        run: |
          # Minimal functional configuration to verify Live555 integration
          ./configure \
            --prefix=$(pwd)/install \
            --host=${{ matrix.host }} \
            --enable-live555 \
            --disable-qt \
            --disable-skins2 \
            --disable-nls \
            --disable-vlc \
            --disable-vlc-wrapper \
            --disable-lua

      - name: Compile VLC Core and Plugins
        working-directory: ./source/vlc
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu || echo 2)

      - name: Extract Build Artifacts
        working-directory: ./source/vlc
        run: make install

      - name: Package VLC Binary Distribution
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: vlc-${{ steps.meta.outputs.vlc_version }}-live555-${{ steps.meta.outputs.live555_version }}-${{ matrix.target }}
          path: ./source/vlc/install/
          retention-days: 7
