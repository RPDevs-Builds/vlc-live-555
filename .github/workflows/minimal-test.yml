name: Step Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [linux-x64]
    steps:
      - name: Checkout Primary Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: main-repo

      - name: Configure Target Variables
        id: target-vars
        run: |
          case "${{ matrix.target }}" in
            linux-x64)
              echo "live555_suffix=linux-64bit" >> $GITHUB_OUTPUT
              echo "host=x86_64-linux-gnu" >> $GITHUB_OUTPUT
              ;;
          esac
          echo "vlc_ref=master" >> $GITHUB_OUTPUT
